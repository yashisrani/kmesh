name: Chinese Grammar Check

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs/proposal/**'
      - 'docs/ctl/**'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs/proposal/**'
      - 'docs/ctl/**'

jobs:
  grammar-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pycorrector torch

      - name: Debug file paths and content
        run: |
          echo "Listing Markdown files:"
          find docs -type f -name "*.md"
          echo "Sample content of all Markdown files:"
          for file in $(find docs -type f -name "*.md"); do
            echo "Content of $file:"
            cat "$file" | head -n 20
            echo "-----"
          done

      - name: Run grammar check with pycorrector
        run: |
          python -c "
          import os
          import pycorrector
          from pathlib import Path

          def check_grammar_in_file(file_path):
              try:
                  with open(file_path, 'r', encoding='utf-8') as file:
                      text = file.read()
                  print(f'Checking pycorrector text in {file_path}: {text[:100]}...')
                  corrector = pycorrector.Pycorrector()
                  errors = corrector.detect(text)
                  return [f'Error: {error}' for error in errors]
              except UnicodeDecodeError:
                  print(f'Encoding error in {file_path}, skipping...')
                  return [f'Error: Unable to decode {file_path} with UTF-8']

          files_to_check = set()
          for directory in ['docs', 'docs/proposal', 'docs/ctl']:
              for file_path in Path(directory).rglob('*.md'):
                  if file_path.is_file():
                      files_to_check.add(str(file_path))

          error_found = False
          error_messages = []

          for file_path in sorted(files_to_check):
              print(f'Checking file with pycorrector: {file_path}')
              errors = check_grammar_in_file(file_path)
              if errors:
                  error_found = True
                  error_messages.append(f'Grammar errors in {file_path}:')
                  for error in errors:
                      error_messages.append(f' - {error}')
              else:
                  print(f'No grammar errors found in {file_path}')

          if error_found:
              print('\nGrammar errors found with pycorrector:')
              for msg in error_messages:
                  print(msg)
              exit(1)
          else:
              print('\nNo grammar errors found in any files with pycorrector.')
          "
